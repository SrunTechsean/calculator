<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js"></script>
    </head>
    <body>
        <div class="calculator">
            <div class="display">
                <p>0</p>
            </div>
            <div class="keypad">
                <!-- row 1 -->
                <button class="btn function">
                    <p></p>
                </button>
                <button class="btn function">
                    <p>AC</p>
                </button>
                <button class=" btn function">
                    <p>%</p>
                </button>
                <button class="btn operator">
                    <p>÷</p>
                </button>

                <!-- row 2 -->
                <button class="btn number">
                    <p>7</p>
                </button>
                <button class="btn number">
                    <p>8</p>
                </button>
                <button class="btn number">
                    <p>9</p>
                </button>
                <button class="btn operator">
                    <p>x</p>
                </button>

                <!-- row 3 -->
                <button class=" btn number">
                    <p>6</p>
                </button>
                <button class="btn number">
                    <p>5</p>
                </button>
                <button class="btn number">
                    <p>4</p>
                </button>
                <button class="btn operator">
                    <p>-</p>
                </button>

                <!-- row 4 -->
                <button class=" btn number">
                    <p>1</p>
                </button>
                <button class="btn number">
                    <p>2</p>
                </button>
                <button class="btn number">
                    <p>3</p>
                </button>
                <button class="btn operator">
                    <p>+</p>
                </button>

                <!-- row 5 -->
                <button class=" btn number">
                    <p></p>
                </button>
                <button class="btn number">
                    <p>0</p>
                </button>
                <button class="btn number">
                    <p>.</p>
                </button>
                <button class="btn operator">
                    <p>=</p>
                </button>

            </div>
        </div>
    </body>
</html>
