<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Calculator</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="calculator">
            <div class="display">0</div>
            <div class="keypad">
                <!-- row 1 -->
                <button class="btn btn-function" data-action="backspace">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
                        <path
                            d="m456-320 104-104 104 104 56-56-104-104 104-104-56-56-104 104-104-104-56 56 104 104-104 104 56 56Zm-96 160q-19 0-36-8.5T296-192L80-480l216-288q11-15 28-23.5t36-8.5h440q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H360ZM180-480l180 240h440v-480H360L180-480Zm400 0Z" />
                    </svg>
                </button>
                <button class="btn btn-function" data-action="clearAll">AC</button>
                <button class="btn btn-function" data-action="percent">%</button>
                <button class="btn btn-operator" data-action="divide">÷</button>

                <!-- row 2 -->
                <button class="btn btn-number" data-value="7">7</button>
                <button class="btn btn-number" data-value="8">8</button>
                <button class="btn btn-number" data-value="9">9</button>
                <button class="btn btn-operator" data-action="multiply">×</button>

                <!-- row 3 -->
                <button class="btn btn-number" data-value="6">6</button>
                <button class="btn btn-number" data-value="5">5</button>
                <button class="btn btn-number" data-value="4">4</button>
                <button class="btn btn-operator" data-action="subtract">−</button>

                <!-- row 4 -->
                <button class="btn btn-number" data-value="1">1</button>
                <button class="btn btn-number" data-value="2">2</button>
                <button class="btn btn-number" data-value="3">3</button>
                <button class="btn btn-operator" data-action="add">+</button>

                <!-- row 5 -->
                <button class="btn btn-number">+/-</button>
                <button class="btn btn-number" data-value="0">0</button>
                <button class="btn btn-number" data-action="dot">.</button>
                <button class="btn btn-operator" data-action="equal">=</button>

            </div>
        </div>
    </body>
</html>
